name: Deploy to Staging

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'store2/package-lock.json'

      - name: Install dependencies (store2)
        run: npm install
        working-directory: store2

      - name: Run tests
        run: npm test --if-present
        working-directory: store2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Staging
        run: |
          firebase deploy \
            --project=${{ secrets.FIREBASE_PROJECT_ID_STAGING }} \
            --token=${{ secrets.FIREBASE_TOKEN }} \
            --only hosting,functions
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

      - name: Comment PR with deployment info
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Staging Deployment Successful**\n\nYour changes have been deployed to the staging environment.\n\n📝 [View Staging Deployment](https://console.firebase.google.com/project/${{ secrets.FIREBASE_PROJECT_ID_STAGING }}/overview)'
            })
