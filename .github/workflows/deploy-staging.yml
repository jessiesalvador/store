name: Deploy to Firebase Staging

on:
  push:
    branches:
      - jessiesalvador-patch-1
  workflow_dispatch:

concurrency:
  group: firebase-staging-${{ github.ref }}
  cancel-in-progress: true

env:
  FIREBASE_PROJECT_ID: jsstore-staging

jobs:
  deploy:
    name: Deploy staging
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.FIREBASE_PROJECT_ID }}
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: store2/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: store2

      - name: Run backend tests
        run: npm test --if-present
        working-directory: store2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase staging
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only hosting,functions,firestore --non-interactive --force
