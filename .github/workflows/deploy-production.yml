name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'store2/package-lock.json'

      - name: Install dependencies (store2)
        run: npm install
        working-directory: store2

      - name: Run tests
        run: npm test --if-present
        working-directory: store2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Production
        run: |
          echo $FIREBASE_SERVICE_ACCOUNT | base64 -d > /tmp/service-account.json
          firebase deploy \
          --project=jsstore-b6d73 \
          --token=$(firebase login:ci --no-localhost 2 > /dev/null || echo $FIREBASE_TOKEN) \
          --only hosting,functions
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Create deployment status check
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              required_contexts: [],
              production_environment: true
            })
